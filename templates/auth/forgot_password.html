<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div class="auth-page auth-page--narrow">

  <div class="auth-visual" aria-hidden="true">
    <div class="auth-visual-inner">
      <div class="auth-logo">GL<em>H</em></div>
      <p class="auth-tagline">GreenField Local Hub</p>
      <blockquote class="auth-quote">
        "Good food tells a story — and ours starts at the farm gate."
        <cite>— Thomas Hartley, Hartley Hill Farm</cite>
      </blockquote>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-form-wrap">

      <div class="auth-back-link">
        <a href="{{ url_for('auth.login') }}" class="auth-link">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          Back to login
        </a>
      </div>

      <h1 class="auth-form-title">Forgot your password?</h1>
      <p class="auth-form-sub">
        Enter the email address linked to your GLH account.
        We'll send you a link to reset your password.
      </p>

      <form method="POST" action="{{ url_for('auth.forgot_password') }}" novalidate>

        <div class="field">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            value="{{ request.form.get('email', '') }}"
            required
            aria-required="true"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">
          Send Reset Link
        </button>

      </form>

      <div class="auth-switch" style="margin-top:1.5rem;">
        Remembered it?
        <a href="{{ url_for('auth.login') }}" class="auth-link">Sign in</a>
      </div>

    </div>
  </div>

</div>
</body>
</html>
